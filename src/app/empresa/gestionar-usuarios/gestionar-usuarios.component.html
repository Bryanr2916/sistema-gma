<div class="mt-4 mb-2 mx-2">
    <h2><i class="g-icon fa-solid fa-briefcase  me-1"></i>Empresa {{empresa.nombre}} - Usuarios</h2>
    <hr class="border border-success border-1 opacity-75">

    <div *ngIf="cargando" class="d-flex justify-content-center">
        <div class="spinner-border mt-5 text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div *ngIf="!cargando" class="content-container">
        <!--Nav-->
        <ul class="nav nav-pills mt-4">
            <li class="nav-item">
                <div class="input-group mb-3">
                    <span class="input-group-text border- border-dark" id="basic-addon1"><i class="fa-solid fa-magnifying-glass"></i></span>
                    <input (ngModelChange)="buscar($event)" [(ngModel)]="busqueda" [ngModelOptions]="{standalone:true}" type="text" class="form-control border- border-dark" placeholder="Buscar..." aria-label="Username" aria-describedby="basic-addon1">
                </div>
            </li>
            <li class="nav-item mx-2">
                <a class="nav-link active" aria-current="page" routerLink="crear"><i class="fa-solid fa-plus"></i> Crear un usuario</a>
            </li>
        </ul>
        <!--Tabla-->
        <div *ngIf="usuariosFiltrados.length > 0" class="table-responsive mb-4 mt-2">
            <table class="table table-light table-striped table-hover shadow table-bordered">
                <thead>
                    <tr class="table-success">
                        <th></th>
                        <th scope="col" *ngFor="let th of ths">{{th}}</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="selectable-row" *ngFor="let usuario of usuariosFiltrados; index as i" (click)="verUsuario(i)">
                        <th>
                            <input [checked]="filaSeleccionada === i" (click)="seleccionarFila($event, i)"
                                class="form-check-input border border-dark" type="checkbox" value="" id="checkDefault">
                        </th>
                        <th scope="row">{{i + 1}}</th>
                        <td>{{usuario.nombre}}</td>
                        <td>{{usuario.correo}}</td>
                        <td>
                            <p class={{claseTipo(usuario.tipo)}}>{{mostrarTipo(usuario.tipo)}}</p>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- Acciones -->
            <div [ngClass]="filaSeleccionada !== -1 ? 'active' : ''" class="table-actions border border-dark">
                <a [class.deshabilitado]="filaSeleccionada !== -1 && esUsuarioActual(usuariosFiltrados[filaSeleccionada])"
                    (click)="borrarFila()" class="d-inline-flex align-items-center">
                    <i class="r-icon fa-solid fa-trash fa-lg me-2"></i>
                    <span class="table-action-text">Borrar</span>
                </a>
                <div class="vr text-success"></div>
                <a (click)="editarFila()" class="d-inline-flex align-items-center">
                    <i class="b-icon fa-solid fa-pen-to-square fa-lg me-2"></i>
                    <span class="table-action-text">Editar</span>
                </a>
                <div class="vr text-success"></div>
                <a [class.deshabilitado]="filaSeleccionada !== -1 && esUsuarioActual(usuariosFiltrados[filaSeleccionada])"
                    (click)="usarComoFila()" class="d-inline-flex align-items-center">
                    <i class="g-icon fa-solid fa-arrow-right-to-bracket fa-lg me-2"></i>
                    <span class="table-action-text">Usar como</span>
                </a>
            </div>
        </div>
        <!--No hay resultados-->
        <div *ngIf="usuariosFiltrados.length === 0 && usuariosTodos.length > 0" class="my-4">
            <h4><i class="y-icon fa-solid fa-triangle-exclamation"></i> No se encontraron resultados</h4>
        </div>

        <!--No hay registro-->
        <div *ngIf="usuariosTodos.length === 0" class="my-4">
            <h4><i class="y-icon fa-solid fa-triangle-exclamation"></i> No hay usuarios registrados</h4>
        </div>
        </div>
</div>
