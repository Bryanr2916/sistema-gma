<div class="d-flex justify-content-center align-items-center gma-page-center">
    <div class="card shadow my-5 text-center border border-dark gma-card-panel gma-card-panel--wide">
        <div class="card-header d-flex justify-content-around">
            <h2><i class="g-icon fa-solid fa-landmark me-1"></i>Editar Empresa</h2>
             <!--Nav-->
            <ul class="nav nav-pills mx-sm-5">
                <li class="nav-item mx-2">
                    <a class="nav-link active" routerLink="/empresa/detalle"><i class="fa-solid fa-chevron-left"></i> Regresar</a>
                </li>
            </ul>
        </div>
        <div class="card-body">
  
          <!--FORM Empresa-->
            <form [formGroup]="formulario" id="form" class="my-5">
                <!--Nombre-->
                <div class="mb-3 me-sm-5 row" id="fieldNombre">
                    <label for="inputNombre" class="col-sm-4 col-form-label">
                      <span class="text-danger">*</span>
                      Nombre
                    </label>
                    <div class="col-sm-8">
                      <input formControlName="nombre" type="text" class="form-control border border-dark" id="inputNombre">
                      <div class="d-flex">
                        <small class="text-danger" *ngIf="errorEnControlador('nombre', 'required')">Nombre requerido</small>
                      </div>
                    </div>
                </div>
                <!--Correo-->
                <div class="mb-3 me-sm-5 row" id="fieldCorreo">
                  <label for="inputCorreo" class="col-sm-4 col-form-label">
                    <span class="text-danger">*</span>
                    Correo Electrónico
                  </label>
                  <div class="col-sm-8">
                    <input formControlName="correo" type="email" class="form-control border border-dark" id="inputCorreo">
                    <div class="d-flex">
                      <small class="text-danger" *ngIf="errorEnControlador('correo', 'required')">Correo requerido</small>
                      <small class="text-danger" *ngIf="errorEnControlador('correo', 'email')">Formato de correo inválido</small>
                    </div>
                  </div>
                </div>
                <!--Telefono-->
                <div class="mb-3 me-sm-5 row" id="fieldTelefono">
                  <label for="inputTelefono" class="col-sm-4 col-form-label">
                    <span class="text-danger">*</span>
                    Número de teléfono
                  </label>
                  <div class="col-sm-8">
                    <input formControlName="telefono" type="number" class="form-control border border-dark" id="inputTelefono">
                    <div class="d-flex">
                      <small class="text-danger" *ngIf="errorEnControlador('telefono', 'required')">Teléfono requerido</small>
                    </div>
                  </div>
                </div>
                <!--Paises-->
                <div class="mb-3 me-sm-5 row" id="fieldPaises">
                  <label for="inputPais" class="col-sm-4 col-form-label">
                    <span class="text-danger">*</span>
                    Paises
                  </label>
                  <div class="col-sm-8">
                    <app-multi-select [opciones]="paises" [controlName]="'paises'" [formulario]="formulario"></app-multi-select>
                    <div class="d-flex">
                      <small class="text-danger" *ngIf="errorEnControlador('paises', 'required')">Paises requeridos</small>
                      <small class="text-danger" *ngIf="errorEnControlador('paises', 'emptySelect')">Paises requeridos</small>
                    </div>
                  </div>
                </div>
                <!--Logo-->
                <div class="mb-3 me-sm-5 row">
                  <label for="inputLogo" class="col-sm-4 col-form-label">Logo de la empresa</label>
                  <div class="col-sm-8">
                    <input (change)="mostrarImagen($event)" type="file" accept="image/*" class="form-control border border-dark" id="inputLogo">
                    <div class="d-flex">
                      <small *ngIf="empresa.urlLogo !==''" class="mt-2 text-danger">* Si selecciona un nuevo archivo sobreescribirá el archivo actual</small>
                    </div>
                  </div>
                  <div class="col-6 mt-2">
                    <img *ngIf="displayLogo" class="img-thumbnail" id="imagePreview" [src]="displayLogo" alt="logo">
                    <h1 *ngIf="displayLogo.length == 0"><i class="g-icon fa-solid fa-image"></i></h1>
                  </div>
                </div>
                <!--Notas-->
                <div class="mb-3 me-sm-5 row">
                  <label for="inputNotas" class="col-sm-12 col-form-label">Notas</label>
                  <div class="col-sm-12">
                      <textarea formControlName="notas" class="form-control border border-dark" name="Notas" id="inputNotas" cols="30" rows="10"></textarea>
                  </div>
                </div>
            </form>
        </div>
        <div class="card-footer">
            <!--Acciones-->
            <div class="mb-3 mx-sm-5 row align-items-center">
                <button (click)="editarEmpresa()" class="btn btn-primary col-12 col-sm-3" type="submit">Editar Empresa</button>
            </div>
        </div>
      </div>
  </div>
