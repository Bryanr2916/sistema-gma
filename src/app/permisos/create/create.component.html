<div class="d-flex justify-content-center align-items-center">
    <div class="card shadow my-5 text-center border border-dark">
        <div class="card-header d-flex justify-content-around">
            <h2><i class="g-icon fa-solid fa-bell me-1"></i> Crear Permiso</h2>
            <!--Nav-->
            <ul class="nav nav-pills mx-5">
                <li class="nav-item mx-2">
                    <a class="nav-link active" routerLink="/permisos"><i class="fa-solid fa-chevron-left"></i> Regresar</a>
                </li>
            </ul>
        </div>

        <div class="card-body">
            <form [formGroup]="formulario" id="form" class="my-4">
                <!--Nombre-->
                <div id="fieldNombre" class="mb-3 me-5 row">
                    <label for="inputNombre" class="col-sm-4 col-form-label">
                        <span class="text-danger">*</span>
                        Nombre
                    </label>
                    <div class="col-sm-8">
                        <input formControlName="nombre" type="text" class="form-control border border-dark" id="inputNombre">
                        <div class="d-flex">
                            <small class="text-danger" *ngIf="errorEnControlador('nombre', 'required')">Nombre requerido</small>
                        </div>
                    </div>
                </div>

                <!--Tipo-->
                <div id="fieldTipo" class="mb-3 me-5 row">
                    <label for="inputTipo" class="col-sm-4 col-form-label ">
                        <span class="text-danger">*</span>
                        Tipo
                    </label>
                    <div class="col-sm-8">
                        <select formControlName="tipo" id="inputTipo" class="form-select border border-dark">
                            <option value="select-valor-vacio" selected>Seleccione el tipo</option>
                            <option *ngFor="let tipo of tipos" value="{{tipo.key}}">{{ tipo.label }}</option>
                        </select>
                        <div class="d-flex">
                            <small class="text-danger" *ngIf="errorEnControlador('tipo', 'required')">Tipo es requerido</small>
                            <small class="text-danger" *ngIf="errorEnControlador('tipo', 'emptySelect')">Tipo es requerido</small>
                        </div>
                    </div>
                </div>

                <!--Fecha Vencimiento-->
                <div id="fieldFecha" class="mb-3 me-5 row">
                    <label for="inputFecha" class="col-sm-4 col-form-label ">
                        <span class="text-danger">*</span>
                        Fecha de Vencimiento
                    </label>
                    <div class="col-sm-8">
                        <input formControlName="fechaVencimiento" type="date" class="form-control border border-dark" id="inputFecha" [min]="fechaMinima">
                        <div class="d-flex">
                            <small class="text-danger" *ngIf="errorEnControlador('fechaVencimiento', 'required')">Fecha requerida</small>
                            <small class="text-danger" *ngIf="errorEnControlador('fechaVencimiento', 'minDate')">Fecha requerida no puede ser inferior a fecha actual</small>
                        </div>
                    </div>
                </div>

                <!--Archivo-->
                <div class="mb-3 me-5 row">
                    <label for="inputArchivo" class="col-sm-4 col-form-label">Archivo</label>
                    <div class="col-sm-8">
                        <input (change)="cargarArchivo($event)" type="file" class="form-control border border-dark" id="inputArchivo">
                    </div>
                </div>

                <!--Estado-->
                <div id="fieldEstado" class="mb-3 me-5 row">
                    <label for="inputEstado" class="col-sm-4 col-form-label ">
                        Estado
                    </label>
                    <div class="col-sm-8">
                        <select formControlName="estado" id="inputEstado" class="form-select border border-dark">
                            <option value="select-valor-vacio" selected>Seleccione el estado</option>
                            <option *ngFor="let estado of estados" value="{{estado.key}}">{{ estado.label }}</option>
                        </select>
                    </div>
                </div>

                <!--Agregar Correos a notificar-->
                <div class="mb-3 me-5 row">
                    <label for="inputCorreos" class="col-sm-4 col-form-label ">Correos a notificar</label>
                    <div class="col-sm-8">
                        <div class="input-group mb-3">
                            <input (keydown)="agregarCorreoConEnter($event)" formControlName="nuevoCorreo" type="email"
                                class="form-control border border-dark" placeholder="Agrega un correo"
                                aria-label="correos" aria-describedby="button-addon2">
                            <button (click)="agregarCorreo()" class="btn btn-outline-primary" type="button" id="button-addon2">
                                <i class="fa-solid fa-plus"></i>
                            </button>
                        </div>
                        <div class="d-flex">
                            <small class="text-danger" *ngIf="errorEnControlador('nuevoCorreo', 'email')">Formato de correo inválido</small>
                        </div>
                    </div>
                </div>

                <!--Mostrar Correos-->
                <div class="mb-3 me-5 row">
                    <div *ngIf="correos.length > 0">
                        <div class="input-group mb-3" *ngFor="let correo of correos; index as i;  trackBy: trackByIndex">
                            <input disabled [(ngModel)]="correos[i].value" [ngModelOptions]="{standalone: true}" type="text"
                                class="form-control" aria-label="Text input with checkbox" value={{correo.value}}>
                            <div class="input-group-text">
                                <button (click)="eliminarCorreo(i)" class="btn btn-outline-danger" type="button"
                                    id="button-addon2">
                                    <i class="fa-solid fa-minus"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div *ngIf="correos.length === 0">
                        <div class="alert alert-secondary" role="alert">
                            <p class="lead"><i class="b-icon fa-solid fa-book me-1"></i> No hay correos a notificar</p>
                        </div>
                    </div>
                </div>

            </form>
        </div>

        <div class="card-footer">
            <div *ngIf="cargandoArchivo" class="my-3 mx-5 row align-items-center">
                <span class="lead">Subiendo archivo... {{ progresoArchivo | number:'1.0-0' }}%</span>
                <div class="progress" role="progressbar" aria-label="Progreso de subida del archivo"
                    [attr.aria-valuenow]="progresoArchivo" aria-valuemin="0" aria-valuemax="100">
                    <div class="progress-bar" [style.width.%]="progresoArchivo"></div>
                </div>
            </div>
            <!--Acciones-->
            <div class="mb-3 mx-5 row align-items-center">
                <button (click)="crearPermiso()" class="btn btn-primary col-sm-3" type="submit">Crear permiso</button>
            </div>
        </div>
    </div>
</div>
